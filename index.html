        <h1>تقريظ التقي الشيخ لمنظومة حلية النوادي</h1>
        <p>تأليف الأصل: القاضي الوزير الداه ولد أعمر طالب</p>
        <p>تقريظ: التقي الشيخ</p>
        <p>اعتنى به: خالد بنجلون</p>
        <h2>نص المنظومة</h2>
        <p>الْحَمْدُ لِلَّهِ عَلَى مَا أَنْعَمَا - بِهِ مِنَ ايٍ كَشَفَتْ عَنَّا الْعَمَى</p>
        <p>وَقَيَّضَ اللَّهُ لِلِاعْتِنَا بِهَا - مَنْ عُدَّ حَافِظًا إِمَامًا نَابِهًا</p>
        <p>كَالسَّبْعَةِ الْقُرَّاءِ مَنْ تَجَرَّدُوا - لِحِفْظِهَا وَفِي الْأَدَا تَفَرَّدُوا</p>
        <p>وَسَلَّمُوا رَايَتَهَا لِلشَّاطِبِي - وَقَبْلَهُ كَمْ قَدَعَتْ مِنْ خَاطِبِ</p>
        <p>وَهْوَ الَّذِي أَدْخَلَهَا فِي حِرْزِهِ - فَلَزِمَ الْقُرَّا لُزُومَ غَرْزِهِ</p>
        <p>وَذَاكَ لِلْقَاضِي الرِّضَى الْمُعَاصِرِ - كُشَاجِمِ الْعَصْرِ الْإِمَامِ النَّاصِرِي</p>
        <p>سَلَّمَهَا فَاظْفَرْ بِمَا أَبْدَاهُ - سَطَّرَهُ فَحَقَّهُ أَدَّاهُ</p>
        <p>وَعَنْ طَوِيلِ الشَّاطِبِيِّ عَدَلَا - لِرَجَزٍ يَكُونُ عَنْهُ بَدَلَا</p>
        <p>وَهْوَ لِغُصْنِ حِرْزِهِ قَدِ اهْتَصَرْ - لَكِنَّهُ أَوْجَزَ فِيهِ وَاخْتَصَرْ</p>
        <p>مُقَرِّبًا لَهُ بِحِلْيَةِ النَّوَا - دِي آخِذًا جَنَاهُ مِنْ دُونِ النَّوَى</p>
        <p>فَلَيْسَ فِيهَا بِالْحُرُوفِ رَمْزُ - وَالرَّمْزُ عِنْدِي لَيْسَ فِيهِ لَمْزُ</p>
        <p>إِذْ نَفْعُهُ مَضَتْ بِهِ قُرُونُ - لَكِنَّمَا الْمَنْهَجُ مَنْجَنُونُ</p>
        <p>وَرُبَّمَا اقْتَضَى زَمَانُ السُّرْعَةِ - مِنْ طَالِبِ الْعُلُومِ نَقْصَ جُرْعَةِ</p>
        <p>وَلِلْوَزِيرِ سُلْطَةُ التَّقْدِيرِ - وَذَاكَ يُوكَلُ إِلَى الْوَزِيرِ</p>
        <p>لِذَاكَ فِي مَنْظُومِهِ أَبَى "أَبَا - جَادَ" عَلَى الْقُرَّاءِ رَمْزًا يُجْتَبَى</p>
        <p>فَاظْفَرْ بِهِ يَا طَالِبَ الْعُلُومِ - وَلَسْتَ إِنْ ظَفِرْتَ بِالْمَلُومِ</p>
        <p>وَاعْمِدْ إِلَى الْقَاضِي فَقَوْلُ الْقَاضِي - فِي نَظْمِ حِلْيَةِ النَّوَادِي مَاضِي</p>
        <p>فَطَالِبُ الْعِلْمِ يَطِيبُ عَيْشُهُ - لَدَيْهِ إِذْ بِهِ زَهَتْ تَنْوِيشُهُ</p>
        <p>وَهْوَ عَلَى طَرِيقِهَا عَلَامَهْ - وَاللَّامُ إِنْ تُشَدَّدْ فَلَا مَلَامَهْ</p>
        <p>فَهْوَ ابْنُ إِسْحَاقَ بِهَا وَالْبَاجِي - وَابْنُ دَقِيقِ الْعِيدِ وَابْنُ الْحَاجِ</p>
        <p>وَهْوَ جَلَالُ الدِّينِ فِي الْمَعَانِي - عِلْمًا وَفِي الْبَدِيعِ وَالْبَيَانِ</p>
        <p>وَهْوَ الْكِسَائِيُّ وَعَمْرٌو وَالْفَرَا - هِيدِي وَكُلُّ الصَّيْدِ فِي جَوْفِ الْفَرَا</p>
        <p>فَبَارَكَ اللَّهُ لَهُ فِي الْعُمْرِ - يَرِيشُ فِينَا سَالِمًا وَيَبْرِي</p>
        <p>فَإِنَّهُ بِالْوُدِّ مِنَّا قَدْ دَنَا - "وَرَجُلٌ مِنَ الْكِرَامِ عِنْدَنَا"</p>
        <p>ثُمَّ عَلَى طَهَ صَلَاةٌ ضَاءَ - بِهَا الْفَضَا لَا تَعْرِفُ انْقِضَاءَ</p>
